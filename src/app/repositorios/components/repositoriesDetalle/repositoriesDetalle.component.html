<div class="ml-64 p-8 h-screen overflow-y-auto bg-background">
  <div class="max-w-4xl mx-auto" *ngIf="repositorie">

    <div class="flex items-center gap-4 mb-8">
      <button [routerLink]="['/repositories']"
        class="text-neutral-400 hover:text-white border border-neutral-700 rounded-lg px-3 py-1 text-sm">
        ← Volver
      </button>
      <h1 class="text-2xl font-semibold text-neutral-100">{{ repositorie.name }}</h1>
      <span class="bg-blue-900 text-blue-300 text-xs font-bold px-2 py-1 rounded">
        ID: {{ repositorie.id }}
      </span>
    </div>

    <div class="grid grid-cols-12 gap-6">

      <div class="col-span-8">
        <div class="bg-[#262626] border border-[#333] rounded-xl p-6">
          <h3 class="text-neutral-100 font-semibold text-base mb-6">Información del repositorio</h3>
          <div class="space-y-4">

            <div class="flex items-center py-2 border-b border-neutral-800 px-2 gap-8">
              <span class="text-neutral-400 text-sm w-32 shrink-0">ID</span>
              <code class="text-xs bg-black px-2 py-1 rounded text-blue-400">{{ repositorie.id }}</code>
            </div>

            <div class="flex items-center py-2 border-b border-neutral-800 px-2 gap-8">
              <span class="text-neutral-400 text-sm w-32 shrink-0">Nombre</span>
              <span class="text-neutral-200 text-sm font-semibold">{{ repositorie.name }}</span>
            </div>

            <div class="flex items-center py-2 border-b border-neutral-800 px-2 gap-8">
              <span class="text-neutral-400 text-sm w-32 shrink-0">Descripción</span>
              <span class="text-neutral-200 text-sm">{{ repositorie.description }}</span>
            </div>

            <div class="flex items-center py-2 border-b border-neutral-800 px-2 gap-8">
              <span class="text-neutral-400 text-sm w-32 shrink-0">Owner ID</span>
              <span class="text-neutral-200 text-sm">{{ repositorie.ownerId }}</span>
            </div>

            <div class="flex items-center py-2 px-2 gap-8">
              <span class="text-neutral-400 text-sm w-32 shrink-0">Creado</span>
              <span class="text-neutral-200 text-sm">{{ repositorie.createdAt }}</span>
            </div>

          </div>
        </div>
      </div>

      <div class="col-span-4">
        <div class="bg-[#262626] border border-[#333] rounded-xl p-6">
          <h3 class="text-neutral-100 font-semibold text-base mb-6">Estadísticas</h3>
          <div class="flex flex-col items-center justify-center gap-2 py-4">
            <span class="text-yellow-400 text-4xl font-bold">{{ repositorie.stars }}</span>
            <span class="text-neutral-400 text-sm">Stars</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
